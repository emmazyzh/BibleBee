name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_CLOUDFLARE_APP_URL: ${{ secrets.VITE_CLOUDFLARE_APP_URL }}
          VITE_VERCEL_APP_URL: ${{ secrets.VITE_VERCEL_APP_URL }}
          VITE_PRIMARY_API_BASE_URL: ${{ secrets.VITE_PRIMARY_API_BASE_URL }}
          VITE_FALLBACK_API_BASE_URL: ${{ secrets.VITE_FALLBACK_API_BASE_URL }}
        run: npm run build

      - name: Sync Cloudflare runtime secrets
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          BIBLEBEE_DATABASE_URL: ${{ secrets.BIBLEBEE_DATABASE_URL }}
          FRONTEND_ORIGINS: ${{ secrets.FRONTEND_ORIGINS }}
        run: |
          printf "%s" "$VITE_CLERK_PUBLISHABLE_KEY" | npx wrangler secret put CLERK_PUBLISHABLE_KEY
          printf "%s" "$CLERK_SECRET_KEY" | npx wrangler secret put CLERK_SECRET_KEY
          printf "%s" "$BIBLEBEE_DATABASE_URL" | npx wrangler secret put BIBLEBEE_DATABASE_URL
          printf "%s" "$FRONTEND_ORIGINS" | npx wrangler secret put FRONTEND_ORIGINS

      - name: Deploy to Cloudflare
        run: npx wrangler deploy

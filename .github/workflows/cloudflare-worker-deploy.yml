name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_CLOUDFLARE_APP_URL: ${{ secrets.VITE_CLOUDFLARE_APP_URL }}
          VITE_VERCEL_APP_URL: ${{ secrets.VITE_VERCEL_APP_URL }}
          VITE_PRIMARY_API_BASE_URL: ${{ secrets.VITE_PRIMARY_API_BASE_URL }}
          VITE_FALLBACK_API_BASE_URL: ${{ secrets.VITE_FALLBACK_API_BASE_URL }}
        run: npm run build

      - name: Deploy to Cloudflare
        run: npx wrangler deploy

        // 首字母模式组件
        function FirstLetterMode({ verse, darkMode }) {
            const [revealedWords, setRevealedWords] = useState(new Set());
            const words = verse.english.split(' ');
            
            const handleWordClick = (index) => {
                setRevealedWords(prev => new Set([...prev, index]));
            };
            
            return (
                <div className="text-center">
                    <p className="text-2xl leading-relaxed" style={{fontFamily: 'Playfair Display, serif'}}>
                        {words.map((word, index) => {
                            const isRevealed = revealedWords.has(index);
                            return (
                                <span 
                                    key={index} 
                                    className="inline-block mr-3 mb-2 cursor-pointer hover:opacity-80"
                                    onClick={() => handleWordClick(index)}
                                >
                                    {isRevealed ? (
                                        <span>{word}</span>
                                    ) : (
                                        <>
                                            <span className="font-bold">{word.charAt(0).toUpperCase()}</span>
                                            <span className="text-gray-400">{word.slice(1).replace(/[a-zA-Z]/g, '_')}</span>
                                        </>
                                    )}
                                </span>
                            );
                        })}
                    </p>
                    <p className="text-sm text-gray-400 mt-8">点击任意空格显示完整单词</p>
                </div>
            );
        }

        // 挖空模式组件
        function FillInMode({ verse, darkMode }) {
            const [revealedKeywords, setRevealedKeywords] = useState(new Set());
            
            const handleKeywordClick = (keyword) => {
                setRevealedKeywords(prev => new Set([...prev, keyword]));
            };
            
            const renderText = () => {
                let text = verse.chinese;
                const elements = [];
                let lastIndex = 0;
                
                const keywordPositions = [];
                verse.keywords.forEach(keyword => {
                    let pos = text.indexOf(keyword);
                    while (pos !== -1) {
                        keywordPositions.push({pos, length: keyword.length, keyword});
                        pos = text.indexOf(keyword, pos + 1);
                    }
                });
                
                keywordPositions.sort((a, b) => a.pos - b.pos);
                
                const uniquePositions = [];
                keywordPositions.forEach(kp => {
                    if (!uniquePositions.some(up => up.pos === kp.pos)) {
                        uniquePositions.push(kp);
                    }
                });
                
                uniquePositions.forEach(({pos, length, keyword}) => {
                    if (pos > lastIndex) {
                        elements.push(<span key={`text-${pos}`}>{text.slice(lastIndex, pos)}</span>);
                    }
                    
                    const isRevealed = revealedKeywords.has(keyword);
                    elements.push(
                        <span 
                            key={`kw-${pos}`}
                            className={`inline-block mx-1 px-2 py-1 rounded cursor-pointer transition-all ${
                                isRevealed 
                                    ? 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200' 
                                    : 'bg-primary/10 text-primary border-b-2 border-primary min-w-[3em] text-center hover:bg-primary/20'
                            }`}
                            onClick={() => !isRevealed && handleKeywordClick(keyword)}
                        >
                            {isRevealed ? keyword : '?'}
                        </span>
                    );
                    
                    lastIndex = pos + length;
                });
                
                if (lastIndex < text.length) {
                    elements.push(<span key={`text-end`}>{text.slice(lastIndex)}</span>);
                }
                
                return elements;
            };
            
            return (
                <div className="text-center">
                    <p className="text-2xl leading-relaxed" style={{fontFamily: 'Playfair Display, serif'}}>
                        {renderText()}
                    </p>
                    <p className="text-sm text-gray-400 mt-8">点击问号查看提示</p>
                </div>
            );
        }

            const [skippedVerses, setSkippedVerses] = useState([]);
            const [currentVerses, setCurrentVerses] = useState([1, 2, 3]);
            const [showNextGroupModal, setShowNextGroupModal] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [showSearchResults, setShowSearchResults] = useState(false);
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [settings, setSettings] = useState({
                chineseVersion: 'cuv',
                englishVersion: 'esv',
                versesPerGroup: 3
            });
            const [editingName, setEditingName] = useState(false);
            const [newName, setNewName] = useState('');
            
            const cardRef = useRef(null);
            const touchStartX = useRef(0);

            useEffect(() => {
                const savedUser = localStorage.getItem('bibleBeeUser');
                if (savedUser) {
                    setUser(JSON.parse(savedUser));
                    setIsLoggedIn(true);
                }
            }, []);

            const handleLogin = (userData) => {
                const userInfo = { ...userData, name: userData.name || 'User', avatar: null };
                setUser(userInfo);
                setIsLoggedIn(true);
                localStorage.setItem('bibleBeeUser', JSON.stringify(userInfo));
            };

            const handleLogout = () => {
                setUser(null);
                setIsLoggedIn(false);
                localStorage.removeItem('bibleBeeUser');
                setActiveTab('memorization');
            };

            const handleUpdateName = () => {
                if (newName.trim()) {
                    const updatedUser = { ...user, name: newName.trim() };
                    setUser(updatedUser);
                    localStorage.setItem('bibleBeeUser', JSON.stringify(updatedUser));
                }
                setEditingName(false);
                setNewName('');
            };
            
            const getCurrentVerseList = () => {
                return currentVerses
                    .map(id => allVerses.find(v => v.id === id))
                    .filter(v => v && !masteredVerses.some(mv => mv.id === v.id));
            };
            
            const currentVerseList = getCurrentVerseList();
            const currentVerse = currentVerseList[currentVerseIndex];
            
            const toggleDarkMode = () => setDarkMode(!darkMode);
            const toggleSidebar = () => setSidebarOpen(!sidebarOpen);
            
            const goToNextVerse = () => {
                setCurrentVerseIndex((prev) => (prev + 1) % currentVerseList.length);
            };
            
            const goToPrevVerse = () => {
                setCurrentVerseIndex((prev) => (prev - 1 + currentVerseList.length) % currentVerseList.length);
            };
            
            const handleTouchStart = (e) => {
                touchStartX.current = e.touches[0].clientX;
            };
            
            const handleTouchEnd = (e) => {
                const touchEndX = e.changedTouches[0].clientX;
                const diff = touchStartX.current - touchEndX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) goToNextVerse();
                    else goToPrevVerse();
                }
            };
            
            const handleMastered = () => {
                if (!currentVerse) return;
                const today = new Date().toISOString().split('T')[0];
                setMasteredVerses([...masteredVerses, { id: currentVerse.id, date: today, reviewCount: 1 }]);
                const remainingVerses = currentVerseList.filter(v => v.id !== currentVerse.id);
                if (remainingVerses.length === 0) {
                    setTimeout(() => {
                        setShowNextGroupModal(true);
                    }, 300);
                } else {
                    if (currentVerseIndex >= remainingVerses.length) {
                        setCurrentVerseIndex(0);
                    }
                }
            };
            
            const handleNotMastered = () => {
                goToNextVerse();
            };
            
            const handleSkip = () => {
                if (!currentVerse) return;
                setSkippedVerses([...skippedVerses, currentVerse.id]);
                const remainingVerses = currentVerseList.filter(v => v.id !== currentVerse.id);
                if (remainingVerses.length === 0) {
                    setTimeout(() => {
                        setShowNextGroupModal(true);
                    }, 300);
                } else {
                    if (currentVerseIndex >= remainingVerses.length) {
                        setCurrentVerseIndex(0);
                    }
                }
            };
            
            const handleSearch = () => {
                if (searchQuery.trim()) {
                    setShowSearchResults(true);
                    setActiveTab('search');
                }
            };
            
            const addVerseToList = (verseId) => {
                if (!currentVerses.includes(verseId)) {
                    setCurrentVerses([...currentVerses, verseId]);
                }
                setActiveTab('memorization');
                setShowSearchResults(false);
                setSearchQuery('');
            };
            
            const selectCollection = (collection) => {
                setCurrentVerses(collection.verses.slice(0, settings.versesPerGroup));
                setMasteredVerses([]);
                setSkippedVerses([]);
                setCurrentVerseIndex(0);
                setActiveTab('memorization');
            };
            
            const startNextGroup = () => {
                const remainingIds = allVerses
                    .filter(v => !masteredVerses.some(mv => mv.id === v.id))
                    .slice(0, settings.versesPerGroup)
                    .map(v => v.id);
                
                if (remainingIds.length > 0) {
                    setCurrentVerses(remainingIds);
                    setCurrentVerseIndex(0);
                }
                setShowNextGroupModal(false);
            };
            
            const searchResults = searchQuery.trim() 
                ? allVerses.filter(v => 
                    v.chinese.includes(searchQuery) || 
                    v.english.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    v.reference.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    v.referenceCN.includes(searchQuery)
                  )
                : [];
            
            const totalMastered = masteredVerses.length;
            const pendingVerses = currentVerses
                .map(id => allVerses.find(v => v.id === id))
                .filter(v => v && !masteredVerses.some(mv => mv.id === v.id) && !skippedVerses.includes(v.id));

            if (!isLoggedIn) {
                return <LoginPage onLogin={handleLogin} />;
            }

            return (
                <div className={`min-h-screen transition-colors duration-300 ${darkMode ? 'bg-gray-900 text-gray-100' : 'bg-gray-50 text-gray-800'}`}>
                    {/* Header */}
                    <header className={`sticky top-0 z-50 ${darkMode ? 'bg-gray-800' : 'bg-white'} shadow-sm`}>
                        <div className="container mx-auto px-4 py-3 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <button onClick={toggleSidebar} className={`p-2 rounded-md ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-100'}`}>
                                    <IconMenu />
                                </button>
                                <button 
                                    onClick={() => setActiveTab('memorization')}
                                    className="flex items-center space-x-2 hover:opacity-80 transition-opacity"
                                >
                                    <div className="text-primary"><IconBook /></div>
                                    <h1 className="text-xl font-bold" style={{fontFamily: 'Rye, cursive'}}>Bible Bee</h1>
                                </button>
                            </div>
                            
                            {/* 搜索框 */}
                            <div className="hidden md:flex items-center flex-1 max-w-md mx-8">
                                <div className="relative w-full">
                                    <input
                                        type="text"
                                        placeholder="搜索我要背的经文，例如：福音"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleSearch()}
                                        className={`w-full pl-10 pr-4 py-2 rounded-full border ${darkMode ? 'bg-gray-700 border-gray-600' : 'bg-gray-100 border-gray-200'} focus:outline-none focus:border-primary`}
                                    />
                                    <button 
                                        onClick={handleSearch}
                                        className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"
                                    >
                                        <IconSearch />
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex items-center space-x-4">
                                {/* 排行榜按钮 */}
                                <button 
                                    onClick={() => setActiveTab('leaderboard')}
                                    className={`p-2 rounded-full ${darkMode ? 'hover:bg-gray-700 text-yellow-400' : 'hover:bg-gray-100 text-yellow-500'}`}
                                    title="排行榜"
                                >
                                    <IconMedal />
                                </button>
                                <button onClick={toggleDarkMode} className={`p-2 rounded-full ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-100'}`}>
                                    {darkMode ? <IconSun /> : <IconMoon />}
                                </button>
                                <button 
                                    onClick={() => setActiveTab('userinfo')}
                                    className={`flex items-center space-x-2 p-1 rounded-full ${darkMode ? 'hover:bg-gray-700' : 'hover:bg-gray-100'}`}
                                >
                                    <div className="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center">
                                        <IconUser />
                                    </div>
                                    <span className="hidden md:inline">{user?.name}</span>
                                </button>
                            </div>
                        </div>
                    </header>

                    <div className="flex">
                        {/* Sidebar */}
                        <aside className={`fixed inset-y-0 left-0 z-40 w-64 transform ${sidebarOpen ? 'translate-x-0' : '-translate-x-full'} transition-transform duration-300 ease-in-out ${darkMode ? 'bg-gray-800' : 'bg-white'} shadow-lg`}>
                            <div className="h-full flex flex-col">
                                <div className="p-4 border-b border-gray-200 dark:border-gray-700">
                                    <div className="flex items-center space-x-2">
                                        <div className="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center">
                                            <IconUser />
                                        </div>
                                        <div>
                                            <h3 className="font-medium">{user?.name}</h3>
                                            <p className="text-sm text-gray-500 dark:text-gray-400">已背 {totalMastered} 节</p>
                                        </div>
                                    </div>
                                </div>
                                <nav className="flex-1 p-4">
                                    <ul className="space-y-2">
                                        {[
                                            {id: 'memorization', label: '背诵', icon: IconBookOpen},
                                            {id: 'study', label: '研读', icon: IconStudy},
                                            {id: 'plan', label: '计划', icon: IconBarChart},
                                            {id: 'progress', label: '我的', icon: IconUser},
                                            {id: 'settings', label: '设置', icon: IconSettings},
                                        ].map(item => (
                                            <li key={item.id}>
                                                <button 
                                                    onClick={() => {setActiveTab(item.id); setSidebarOpen(false);}}
                                                    className={`w-full flex items-center space-x-3 px-3 py-2 rounded-md transition-colors ${activeTab === item.id ? 'bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400' : `${darkMode ? 'hover:bg-gray-700 text-gray-200' : 'hover:bg-gray-100 text-gray-700'}`}`}
                                                >
                                                    <item.icon />
                                                    <span>{item.label}</span>
                                                </button>
                                            </li>
                                        ))}
                                    </ul>
                                </nav>
                            </div>
                        </aside>

                        {sidebarOpen && (
                            <div 
                                className="fixed inset-0 bg-black bg-opacity-50 z-30"
                                onClick={() => setSidebarOpen(false)}
                            />
                        )}

                        {/* Main Content */}
                        <main className="flex-1 p-4 md:p-6">
                            {activeTab === 'memorization' && (
                                <div className="h-[calc(100vh-120px)] flex flex-col">
                                    {showNextGroupModal && (
                                        <div className="fixed inset-0 flex items-center justify-center z-50 bg-black bg-opacity-50">
                                            <div className="bg-white dark:bg-gray-800 rounded-3xl p-10 text-center max-w-md mx-4 shadow-2xl">
                                                <div className="w-20 h-20 mx-auto mb-6 rounded-full bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center">
                                                    <svg className="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path>
                                                    </svg>
                                                </div>
                                                <h3 className="text-3xl font-bold mb-3 bg-gradient-to-r from-green-500 to-blue-500 bg-clip-text text-transparent">恭喜完成！</h3>
                                                <p className="text-gray-600 dark:text-gray-300 mb-2 text-lg">你已经掌握了这组经文</p>
                                                <p className="text-4xl font-bold text-primary mb-6">{totalMastered}</p>
                                                <p className="text-sm text-gray-500 mb-8">节经文已背诵</p>
                                                <button 
                                                    onClick={startNextGroup}
                                                    className="w-full py-4 bg-gradient-to-r from-primary to-blue-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all transform hover:scale-105"
                                                >
                                                    开始下一组
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {currentVerseList.length === 0 ? (
                                        <div className="flex-1 flex items-center justify-center">
                                            <div className="text-center">
                                                <p className="text-xl text-gray-500 mb-4">当前组经文已全部完成！</p>
                                                <button 
                                                    onClick={() => setActiveTab('plan')}
                                                    className="px-6 py-3 bg-primary text-white rounded-full hover:bg-blue-600"
                                                >
                                                    选择新的经文列表
                                                </button>
                                            </div>
                                        </div>
                                    ) : (
                                        <div 
                                            ref={cardRef}
                                            className={`flex-1 ${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-2xl shadow-lg p-6 flex flex-col relative`}
                                            onTouchStart={handleTouchStart}
                                            onTouchEnd={handleTouchEnd}
                                        >
                                            <button 
                                                onClick={goToPrevVerse}
                                                className={`absolute left-4 top-1/2 -translate-y-1/2 p-3 rounded-full transition-all ${darkMode ? 'hover:bg-gray-700 bg-gray-800/80' : 'hover:bg-gray-200 bg-white/80'} shadow-md z-10`}
                                            >
                                                <IconChevronLeft />
                                            </button>
                                            
                                            <button 
                                                onClick={goToNextVerse}
                                                className={`absolute right-4 top-1/2 -translate-y-1/2 p-3 rounded-full transition-all ${darkMode ? 'hover:bg-gray-700 bg-gray-800/80' : 'hover:bg-gray-200 bg-white/80'} shadow-md z-10`}
                                            >
                                                <IconChevronRight />
                                            </button>

                                            <div className="flex justify-center space-x-4 mb-4">
                                                {[
                                                    {key: 'parallel', icon: IconParallel, label: '对照'},
                                                    {key: 'fill-in', icon: IconFillIn, label: '挖空'},
                                                    {key: 'first-letter', icon: IconFirstLetter, label: '首字母'}
                                                ].map(mode => (
                                                    <button
                                                        key={mode.key}
                                                        onClick={() => setViewMode(mode.key)}
                                                        className={`flex flex-col items-center p-3 rounded-xl transition-all ${viewMode === mode.key ? 'bg-primary text-white' : `${darkMode ? 'hover:bg-gray-700 text-gray-200' : 'hover:bg-gray-100 text-gray-700'}`}`}
                                                    >
                                                        <mode.icon />
                                                        <span className="text-xs mt-1">{mode.label}</span>
                                                    </button>
                                                ))}
                                            </div>

                                            <div className="text-center mb-4">
                                                <h2 className="text-3xl font-bold text-primary mb-1" style={{fontFamily: 'Playfair Display, serif'}}>
                                                    {currentVerse?.referenceCN}
                                                </h2>
                                                <p className="text-sm text-gray-500" style={{fontFamily: 'Playfair Display, serif'}}>
                                                    {currentVerse?.reference}
                                                </p>
                                            </div>

                                            <div className="text-center mb-4">
                                                <span className={`inline-block px-4 py-1 rounded-full text-sm ${darkMode ? 'bg-gray-700 text-gray-200' : 'bg-gray-100 text-gray-700'}`}>
                                                    {currentVerseIndex + 1} / {currentVerseList.length}
                                                </span>
                                            </div>

                                            <div className="flex-1 flex flex-col justify-center space-y-6 overflow-y-auto px-16">
                                                {viewMode === 'parallel' && (
                                                    <>
                                                        <div className="text-center">
                                                            <p className="text-2xl leading-relaxed font-medium" style={{fontFamily: 'Playfair Display, serif'}}>
                                                                {currentVerse?.chinese}
                                                            </p>
                                                        </div>
                                                        <div className="text-center">
                                                            <p className="text-xl leading-relaxed" style={{fontFamily: 'Playfair Display, serif', color: darkMode ? '#e5e7eb' : '#4b5563'}}>
                                                                {currentVerse?.english}
                                                            </p>
                                                        </div>
                                                    </>
                                                )}

                                                {viewMode === 'first-letter' && currentVerse && (
                                                    <FirstLetterMode verse={currentVerse} darkMode={darkMode} />
                                                )}

                                                {viewMode === 'fill-in' && currentVerse && (
                                                    <FillInMode verse={currentVerse} darkMode={darkMode} />
                                                )}
                                            </div>
                                            
                                            <div className="text-center mt-4">
                                                <button 
                                                    onClick={() => setActiveTab('study')}
                                                    className="text-sm text-primary hover:underline"
                                                >
                                                    深度研读
                                                </button>
                                            </div>

                                            <div className="flex justify-center items-center space-x-6 mt-6">
                                                <button 
                                                    onClick={handleNotMastered}
                                                    className="px-8 py-3 rounded-full border-2 border-orange-400 text-orange-500 hover:bg-orange-50 dark:hover:bg-orange-900/20 font-medium transition-all"
                                                >
                                                    不熟
                                                </button>
                                                <button 
                                                    onClick={handleMastered}
                                                    className="px-8 py-3 rounded-full bg-green-500 text-white hover:bg-green-600 font-medium transition-all shadow-lg"
                                                >
                                                    会背
                                                </button>
                                                <button 
                                                    onClick={handleSkip}
                                                    className="text-sm text-gray-400 hover:text-gray-600 underline"
                                                >
                                                    跳过
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeTab === 'search' && (
                                <div className="space-y-6">
                                    <div className="flex items-center justify-between">
                                        <div>
                                            <h2 className="text-2xl font-bold" style={{fontFamily: 'Playfair Display, serif'}}>搜索结果</h2>
                                            <p className="text-gray-500 text-sm mt-1">搜索"{searchQuery}"，找到 {searchResults.length} 节经文</p>
                                        </div>
                                        <button 
                                            onClick={() => {setActiveTab('memorization'); setShowSearchResults(false);}}
                                            className="text-primary hover:underline"
                                        >
                                            返回首页
                                        </button>
                                    </div>
                                    
                                    <div className="space-y-4 max-w-3xl mx-auto">
                                        {searchResults.length === 0 ? (
                                            <p className="text-gray-500 text-center py-10">未找到匹配的经文</p>
                                        ) : (
                                            searchResults.map(verse => (
                                                <div key={verse.id} className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow`}>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div>
                                                            <h3 className="text-xl font-bold text-primary">{verse.referenceCN}</h3>
                                                            <p className="text-sm text-gray-500 mt-1">{verse.reference}</p>
                                                        </div>
                                                        <button 
                                                            onClick={() => addVerseToList(verse.id)}
                                                            className="px-5 py-2 bg-primary text-white rounded-full text-sm hover:bg-blue-600 transition-colors"
                                                        >
                                                            加入背诵计划
                                                        </button>
                                                    </div>
                                                    <div className="space-y-3">
                                                        <p className="text-lg text-gray-800 dark:text-gray-200 leading-relaxed">{verse.chinese}</p>
                                                        <p className="text-gray-600 dark:text-gray-400 italic">{verse.english}</p>
                                                    </div>
                                                    <div className="mt-3 pt-3 border-t border-gray-100 dark:border-gray-700">
                                                        <span className="text-xs text-gray-400">和合本</span>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'study' && (
                                <div className="space-y-6">
                                    <div className="flex flex-col md:flex-row md:items-center justify-between space-y-4 md:space-y-0">
                                        <div>
                                            <h2 className="text-2xl font-bold" style={{fontFamily: 'Playfair Display, serif'}}>深度研读</h2>
                                            <p className="text-sm text-gray-400 mt-1">敬畏耶和华是智慧的开端，认识至圣者便是聪明。</p>
                                        </div>
                                    </div>

                                    <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-lg shadow-sm p-6`}>
                                        <h3 className="font-medium mb-4">{currentVerse?.referenceCN} {currentVerse?.reference}</h3>
                                        <div className="space-y-4">
                                            <div style={{fontFamily: 'Playfair Display, serif'}} className="text-lg">
                                                {currentVerse?.english.split(' ').map((word, i) => (
                                                    <span key={i} className="text-primary cursor-pointer hover:underline mr-1">{word}</span>
                                                ))}
                                            </div>
                                            <div style={{fontFamily: 'Playfair Display, serif'}} className="text-lg">
                                                {currentVerse?.chinese}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'plan' && (
                                <div className="space-y-6 max-w-2xl mx-auto">
                                    <div className="text-center mb-8">
                                        <h2 className="text-3xl font-bold mb-2" style={{fontFamily: 'Playfair Display, serif'}}>背诵计划</h2>
                                        <p className="text-gray-600 dark:text-gray-400">选择经文列表开始你的背诵之旅</p>
                                    </div>

                                    <div className="space-y-4">
                                        {verseCollections.map((collection, index) => (
                                            <div key={collection.id} className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-2xl shadow-lg overflow-hidden hover:shadow-xl transition-all transform hover:scale-[1.02]`}>
                                                <div className={`h-2 bg-gradient-to-r ${collection.color}`}></div>
                                                <div className="p-6">
                                                    <div className="flex items-start space-x-4">
                                                        <div className="text-4xl">{collection.icon}</div>
                                                        <div className="flex-1">
                                                            <div className="flex justify-between items-start mb-2">
                                                                <h3 className="text-xl font-bold">{collection.name}</h3>
                                                                <span className={`px-3 py-1 rounded-full text-sm font-medium bg-gradient-to-r ${collection.color} text-white`}>
                                                                    {collection.count}节
                                                                </span>
                                                            </div>
                                                            <p className="text-gray-600 dark:text-gray-400 mb-4">{collection.description}</p>
                                                            <div className="flex items-center justify-between">
                                                                <div className="flex space-x-2">
                                                                    {collection.verses.slice(0, 3).map((vId, i) => (
                                                                        <span key={i} className="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-xs text-gray-500">
                                                                            {i + 1}
                                                                        </span>
                                                                    ))}
                                                                    {collection.verses.length > 3 && (
                                                                        <span className="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-xs text-gray-500">
                                                                            +{collection.verses.length - 3}
                                                                        </span>
                                                                    )}
                                                                </div>
                                                                <button 
                                                                    onClick={() => selectCollection(collection)}
                                                                    className={`px-6 py-2 rounded-full text-white font-medium bg-gradient-to-r ${collection.color} hover:shadow-lg transition-all`}
                                                                >
                                                                    选择此列表
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'userinfo' && (
                                <div className="space-y-6 max-w-2xl mx-auto">
                                    <div className="text-center mb-8">
                                        <h2 className="text-3xl font-bold mb-2" style={{fontFamily: 'Playfair Display, serif'}}>用户信息</h2>
                                    </div>
                                    
                                    <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-2xl shadow-sm p-8`}>
                                        <div className="flex items-center space-x-6 mb-8">
                                            <div className="relative">
                                                <div className="w-24 h-24 rounded-full bg-primary text-white flex items-center justify-center text-4xl">
                                                    {user?.name?.charAt(0).toUpperCase()}
                                                </div>
                                                <button className={`absolute bottom-0 right-0 w-10 h-10 rounded-full flex items-center justify-center text-sm ${darkMode ? 'bg-gray-600 hover:bg-gray-500' : 'bg-gray-200 hover:bg-gray-300'}`}>
                                                    📷
                                                </button>
                                            </div>
                                            <div className="flex-1">
                                                <p className="text-sm text-gray-500 mb-1">用户名</p>
                                                {editingName ? (
                                                    <div className="flex items-center space-x-2">
                                                        <input
                                                            type="text"
                                                            value={newName}
                                                            onChange={(e) => setNewName(e.target.value)}
                                                            className={`px-3 py-2 border rounded-lg ${darkMode ? 'bg-gray-700 border-gray-600' : 'bg-white border-gray-300'}`}
                                                            placeholder="输入新用户名"
                                                        />
                                                        <button 
                                                            onClick={handleUpdateName}
                                                            className="px-4 py-2 bg-primary text-white rounded-lg"
                                                        >
                                                            保存
                                                        </button>
                                                        <button 
                                                            onClick={() => {setEditingName(false); setNewName('');}}
                                                            className={`px-4 py-2 rounded-lg ${darkMode ? 'bg-gray-600 text-gray-200' : 'bg-gray-200 text-gray-700'}`}
                                                        >
                                                            取消
                                                        </button>
                                                    </div>
                                                ) : (
                                                    <div className="flex items-center space-x-3">
                                                        <p className="text-2xl font-medium">{user?.name}</p>
                                                        <button 
                                                            onClick={() => {setEditingName(true); setNewName(user?.name);}}
                                                            className="text-sm text-primary hover:underline"
                                                        >
                                                            修改
                                                        </button>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-4">
                                            <div className={`p-4 rounded-xl ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                                <p className="text-sm text-gray-500 mb-1">邮箱</p>
                                                <p className="text-lg">{user?.email}</p>
                                            </div>
                                        </div>
                                        
                                        <div className="mt-8 pt-6 border-t border-gray-200 dark:border-gray-700">
                                            <button 
                                                onClick={handleLogout}
                                                className="w-full py-3 border-2 border-red-400 text-red-500 rounded-xl font-medium hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors flex items-center justify-center space-x-2"
                                            >
                                                <IconLogOut />
                                                <span>退出登录</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'progress' && (
                                <div className="space-y-6 max-w-3xl mx-auto">
                                    <div className="text-center mb-8">
                                        <h2 className="text-3xl font-bold mb-2" style={{fontFamily: 'Playfair Display, serif'}}>我的背诵进度</h2>
                                    </div>
                                    
                                    <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-2xl shadow-sm p-8 text-center`}>
                                        <p className="text-gray-600 dark:text-gray-400 mb-2">{user?.name}，你已经背了</p>
                                        <p className="text-6xl font-bold text-primary mb-2">{totalMastered}</p>
                                        <p className="text-gray-600 dark:text-gray-400">节经文</p>
                                    </div>

                                    <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-xl shadow-sm p-6`}>
                                        <h3 className="text-lg font-bold mb-4 flex items-center">
                                            <span className="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
                                            已会背的经文
                                        </h3>
                                        {masteredVerses.length === 0 ? (
                                            <p className="text-gray-500 text-center py-4">还没有会背的经文</p>
                                        ) : (
                                            <div className="space-y-3">
                                                {masteredVerses.map(mv => {
                                                    const verse = allVerses.find(v => v.id === mv.id);
                                                    return (
                                                        <div key={mv.id} className={`flex justify-between items-center p-4 rounded-xl ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                                            <div className="flex-1">
                                                                <p className="font-bold text-primary">{verse?.referenceCN}</p>
                                                                <p className="text-sm text-gray-600 dark:text-gray-400 mt-1">{verse?.chinese}</p>
                                                            </div>
                                                            <div className="text-right text-sm text-gray-500 ml-4">
                                                                <p className="text-green-600 font-medium">已掌握</p>
                                                                <p>{mv.date}</p>
                                                                <p>复习{mv.reviewCount}次</p>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>

                                    <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-xl shadow-sm p-6`}>
                                        <h3 className="text-lg font-bold mb-4 flex items-center">
                                            <span className="w-2 h-2 bg-orange-400 rounded-full mr-2"></span>
                                            待背诵的经文
                                        </h3>
                                        {pendingVerses.length === 0 ? (
                                            <p className="text-gray-500 text-center py-4">没有待背诵的经文</p>
                                        ) : (
                                            <div className="space-y-3">
                                                {pendingVerses.map(verse => (
                                                    <div key={verse.id} className={`p-4 rounded-xl ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                                        <p className="font-bold text-primary">{verse.referenceCN}</p>
                                                        <p className="text-sm text-gray-600 dark:text-gray-400 mt-1">{verse.chinese}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'leaderboard' && (
                                <div className="space-y-6 max-w-2xl mx-auto">
                                    <div className="text-center mb-8">
                                        <h2 className="text-3xl font-bold mb-2" style={{fontFamily: 'Playfair Display, serif'}}>背诵排行榜</h2>
                                        <p className="text-gray-600 dark:text-gray-400">看看谁背诵了最多经文</p>
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {leaderboardData.map((item, index) => (
                                            <div key={item.id} className={`flex items-center space-x-4 p-4 rounded-xl ${index < 3 ? 'bg-gradient-to-r from-yellow-50 to-orange-50 dark:from-yellow-900/20 dark:to-orange-900/20' : `${darkMode ? 'bg-gray-800' : 'bg-white'}`}`}>
                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-lg ${
                                                    index === 0 ? 'bg-yellow-400 text-white' :
                                                    index === 1 ? 'bg-gray-400 text-white' :
                                                    index === 2 ? 'bg-orange-400 text-white' :
                                                    `${darkMode ? 'bg-gray-700 text-gray-300' : 'bg-gray-200 text-gray-600'}`
                                                }`}>
                                                    {index + 1}
                                                </div>
                                                <div className="w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center text-lg">
                                                    {item.name.charAt(0).toUpperCase()}
                                                </div>
                                                <div className="flex-1">
                                                    <p className="font-medium text-lg">{item.name}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-3xl font-bold text-primary">{item.masteredCount}</p>
                                                    <p className="text-xs text-gray-500">节经文</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'settings' && (
                                <div className="space-y-6 max-w-2xl mx-auto">
                                    <div className="text-center mb-8">
                                        <h2 className="text-3xl font-bold mb-2" style={{fontFamily: 'Playfair Display, serif'}}>设置</h2>
                                        <p className="text-gray-600 dark:text-gray-400">个性化配置你的背诵体验</p>
                                    </div>

                                    <div className={`${darkMode ? 'bg-gray-800' : 'bg-white'} rounded-xl shadow-sm p-6 space-y-6`}>
                                        <div>
                                            <label className="block text-sm font-medium mb-2">中文版本</label>
                                            <select 
                                                value={settings.chineseVersion}
                                                onChange={(e) => setSettings({...settings, chineseVersion: e.target.value})}
                                                className={`w-full px-4 py-3 border rounded-xl ${darkMode ? 'bg-gray-700 border-gray-600' : 'bg-white border-gray-300'}`}
                                            >
                                                <option value="cuv">和合本</option>
                                            </select>
                                        </div>
                                        
                                        <div>
                                            <label className="block text-sm font-medium mb-2">英文版本</label>
                                            <select 
                                                value={settings.englishVersion}
                                                onChange={(e) => setSettings({...settings, englishVersion: e.target.value})}
                                                className={`w-full px-4 py-3 border rounded-xl ${darkMode ? 'bg-gray-700 border-gray-600' : 'bg-white border-gray-300'}`}
                                            >
                                                <option value="esv">ESV</option>
                                                <option value="niv">NIV</option>
                                            </select>
                                        </div>
                                        
                                        <div>
                                            <label className="block text-sm font-medium mb-2">每组背诵经文个数</label>
                                            <select 
                                                value={settings.versesPerGroup}
                                                onChange={(e) => setSettings({...settings, versesPerGroup: parseInt(e.target.value)})}
                                                className={`w-full px-4 py-3 border rounded-xl ${darkMode ? 'bg-gray-700 border-gray-600' : 'bg-white border-gray-300'}`}
                                            >
                                                <option value={1}>1</option>
                                                <option value={2}>2</option>
                                                <option value={3}>3</option>
                                                <option value={5}>5</option>
                                                <option value={7}>7</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
